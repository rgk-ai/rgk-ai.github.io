<header class="site-header">
  <div>
    <a href="{{ .Site.BaseURL }}" class="site-title">{{ .Site.Title }}</a>
    <p class="site-tagline">{{ .Site.Params.tagline }}</p>
  </div>
  <nav class="site-nav">
    {{ range .Site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
  </nav>
</header>
